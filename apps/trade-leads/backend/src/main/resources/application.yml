server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-security}
  expiration: 7200000
  refresh-expiration: 1209600000

forest:
  sms:
    provider: ${FOREST_SMS_PROVIDER:disabled}
    default-sign-name: ${FOREST_SMS_DEFAULT_SIGN_NAME:}
    default-template-code: ${FOREST_SMS_DEFAULT_TEMPLATE_CODE:}
    verification-template-code: ${FOREST_SMS_VERIFICATION_TEMPLATE_CODE:}
    log:
      content-mode: ${FOREST_SMS_LOG_CONTENT_MODE:MASKED_PARTIAL}
      mask-visible-tail: ${FOREST_SMS_LOG_MASK_VISIBLE_TAIL:2}
    aliyun:
      endpoint: ${FOREST_SMS_ALIYUN_ENDPOINT:dysmsapi.aliyuncs.com}
      access-key-id: ${FOREST_SMS_ALIYUN_ACCESS_KEY_ID:${ALIBABA_CLOUD_ACCESS_KEY_ID:}}
      access-key-secret: ${FOREST_SMS_ALIYUN_ACCESS_KEY_SECRET:${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}}
  verification:
    sms:
      code: ${AUTH_SMS_CODE:121314}
      code-ttl: ${FOREST_VERIFICATION_SMS_CODE_TTL:5m}
      max-attempts: ${FOREST_VERIFICATION_SMS_MAX_ATTEMPTS:5}
      send-interval: ${FOREST_VERIFICATION_SMS_SEND_INTERVAL:60s}
      daily-limit: ${FOREST_VERIFICATION_SMS_DAILY_LIMIT:10}
      ticket-ttl: ${FOREST_VERIFICATION_TICKET_TTL:10m}
  carrier-auth:
    provider: ${FOREST_CARRIER_AUTH_PROVIDER:disabled}
    mock-phone: ${FOREST_CARRIER_AUTH_MOCK_PHONE:+8618257147892}
    aliyun:
      endpoint: ${FOREST_CARRIER_AUTH_ALIYUN_ENDPOINT:dypnsapi.aliyuncs.com}
      access-key-id: ${FOREST_CARRIER_AUTH_ALIYUN_ACCESS_KEY_ID:${ALIBABA_CLOUD_ACCESS_KEY_ID:}}
      access-key-secret: ${FOREST_CARRIER_AUTH_ALIYUN_ACCESS_KEY_SECRET:${ALIBABA_CLOUD_ACCESS_KEY_SECRET:}}
  file:
    app-code: trade-leads
    env: ${FOREST_FILE_ENV:local}
    storage:
      provider: aliyun-oss
      aliyun-oss:
        endpoint: ${ALIYUN_OSS_ENDPOINT:}
        access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
        access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
        buckets:
          trade-leads: ${TRADE_LEADS_OSS_BUCKET:trade-leads}
  redis:
    app-code: trade-leads
  client-apps:
    trade-leads-miniapp:
      client-type: WECHAT_MINIAPP
      enabled: true
    trade-leads-platform-web:
      client-type: PC_WEB
      enabled: true
  wechat:
    miniapps:
      trade-leads-miniapp:
        appid: ${TRADE_LEADS_MINIAPP_APPID:}
        secret: ${TRADE_LEADS_MINIAPP_SECRET:}
        mock-enabled: ${TRADE_LEADS_MINIAPP_MOCK_ENABLED:false}

wechat:
  pay:
    # 是否启用真实微信支付。  网址：
    # 生产环境完成商户号、证书、回调地址配置后设为 true。
    enabled: ${WECHAT_PAY_ENABLED:false}

    # 是否启用 mock 支付。
    # 本地开发/接口联调可设为 true，接入真实微信支付时改为 false。
    mock-enabled: ${WECHAT_PAY_MOCK_ENABLED:true}

    # 微信支付商户号。
    mch-id: ${WECHAT_PAY_MCH_ID:my-mch}

    # 发起微信小程序支付的小程序 appid。
    appid: ${WECHAT_PAY_APPID:my-pay-appid}

    # 商户 API 证书序列号。 网址： https://pay.weixin.qq.com/index.php/core/cert/api_cert#/api-cert-manage
    # 用于请求签名及微信侧校验商户证书身份。
    merchant-serial-number: ${WECHAT_PAY_MERCHANT_SERIAL_NO:my-ms}

    # 微信支付 APIv3 密钥。
    # 主要用于解密支付回调报文，不要提交到代码仓库。
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:my-k}

    # 商户私钥文件路径，通常为 apiclient_key.pem。
    # 来源于“商户 API 证书”，用于商户调用微信支付 APIv3 时对请求签名。
    # 建议通过宿主机挂载或环境文件注入，不要把私钥放进仓库。
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}

    # 微信支付公钥 ID。
    # 来源于商户平台“微信支付公钥”，用于标识微信支付公钥并验签微信回调/应答。
    public-key-id: ${WECHAT_PAY_PUBLIC_KEY_ID:my-pk}

    # 微信支付公钥文件路径。
    # 来源于商户平台“微信支付公钥”下载文件，不是商户 API 证书私钥。
    public-key-path: ${WECHAT_PAY_PUBLIC_KEY_PATH:}

    # 微信支付异步回调地址。
    # 必须是微信可访问的外网地址，后端回调路径固定为 /api/open/wechat/pay/notify。
    notify-url: ${WECHAT_PAY_NOTIFY_URL:http://localhost:8081/api/open/wechat/pay/notify}

    # 调用微信支付接口的超时时间，单位秒。
    timeout-seconds: ${WECHAT_PAY_TIMEOUT_SECONDS:10}

spring:
  application:
    name: trade-leads-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trade_leads_local}
    username: ${SPRING_DATASOURCE_USERNAME:forest}
    password: ${SPRING_DATASOURCE_PASSWORD:lingzhi!@#2026}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TradeLeadsBackendHikariPool
      connection-init-sql: SET TIME ZONE 'Asia/Shanghai'

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/user
      - classpath:db/migration/notification
      - classpath:db/migration/file
      - classpath:db/migration/point
      - classpath:db/migration/lead
      - classpath:db/migration/recharge
      - classpath:db/migration/payment
      - classpath:db/migration/trade-leads
