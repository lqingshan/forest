upstream trade_leads_backend_upstream {
    server trade-leads-backend:8081;
}

server {
    listen 80;
    server_name localleads.haitunai.cn localhost 127.0.0.1;

    return 301 https://localleads.haitunai.cn$request_uri;
}

server {
    listen 443 ssl;
    server_name localleads.haitunai.cn;
    http2 on;

    ssl_certificate /etc/nginx/ssl/haitunai.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/haitunai.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/snippets/sites/trade-leads.conf;
}
