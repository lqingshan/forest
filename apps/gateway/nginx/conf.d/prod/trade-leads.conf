upstream trade_leads_backend_upstream {
    least_conn;
    keepalive 32;
    server __TRADE_LEADS_BACKEND_NODE_1__ max_fails=3 fail_timeout=10s;
__TRADE_LEADS_BACKEND_NODE_2_LINE__
}

server {
    listen 80;
    server_name leads.haitunai.cn;

    return 301 https://leads.haitunai.cn$request_uri;
}

server {
    listen 443 ssl;
    server_name leads.haitunai.cn;
    http2 on;

    ssl_certificate /etc/nginx/ssl/haitunai.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/haitunai.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/snippets/sites/trade-leads.conf;
}
