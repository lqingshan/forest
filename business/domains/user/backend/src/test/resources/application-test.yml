spring:
  datasource:
    url: jdbc:h2:mem:user_backend_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  main:
    web-application-type: none
  sql:
    init:
      mode: never
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long

forest:
  redis:
    app-code: trade-leads
  sms:
    provider: mock
  verification:
    sms:
      code: 121314
  client-apps:
    trade-leads-miniapp:
      client-type: WECHAT_MINIAPP
      enabled: true
    purchase-miniapp:
      client-type: WECHAT_MINIAPP
      enabled: true
    supplier-miniapp:
      client-type: WECHAT_MINIAPP
      enabled: true
    trade-leads-platform-web:
      client-type: PC_WEB
      enabled: true
  wechat:
    miniapps:
      trade-leads-miniapp:
        mock-enabled: true
      purchase-miniapp:
        mock-enabled: true
      supplier-miniapp:
        mock-enabled: true
