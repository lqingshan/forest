services:
  redis:
    image: ${REDIS_IMAGE:-crpi-4wiolv963xmb1wvm.cn-hangzhou.personal.cr.aliyuncs.com/hangzhoulingjian/redis:8.2-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-forest-redis}
    mem_limit: ${REDIS_MEM_LIMIT:-1g}
    mem_reservation: ${REDIS_MEM_RESERVATION:-256m}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-forest_redis_shared_2026}
      TZ: Asia/Shanghai
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --requirepass
      - ${REDIS_PASSWORD:-forest_redis_shared_2026}
      - --databases
      - ${REDIS_DATABASES:-16}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-noeviction}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - forest_network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  redis_data:
    name: ${REDIS_VOLUME_NAME:-forest_redis_data}

networks:
  forest_network:
    name: ${FOREST_DOCKER_NETWORK:-forest_network}
