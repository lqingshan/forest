services:
  postgres:
    image: crpi-4wiolv963xmb1wvm.cn-hangzhou.personal.cr.aliyuncs.com/hangzhoulingjian/postgres:18.3-alpine
    container_name: forest-postgres
    mem_limit: 512m
    mem_reservation: 128m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lingzhi!@#2026}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      PGDATA: /var/lib/postgresql/data
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - forest_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:

networks:
  forest_network:
    name: ${FOREST_DOCKER_NETWORK:-forest_network}
