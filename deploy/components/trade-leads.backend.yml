services:
  trade-leads-backend:
    build:
      context: ../..
      dockerfile: apps/trade-leads/backend/Dockerfile
    container_name: forest-trade-leads-backend
    mem_limit: 1g
    mem_reservation: 512m
    environment:
      SERVER_PORT: 8081
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://forest-postgres:5432/trade_leads_local}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-forest}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-lingzhi!@#2026}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-must-be-at-least-256-bits-long-for-security}
      AUTH_SMS_CODE: ${AUTH_SMS_CODE:-121314}
      FOREST_SMS_PROVIDER: ${FOREST_SMS_PROVIDER:-disabled}
      FOREST_SMS_DEFAULT_SIGN_NAME: ${FOREST_SMS_DEFAULT_SIGN_NAME:-}
      FOREST_SMS_DEFAULT_TEMPLATE_CODE: ${FOREST_SMS_DEFAULT_TEMPLATE_CODE:-}
      FOREST_SMS_VERIFICATION_TEMPLATE_CODE: ${FOREST_SMS_VERIFICATION_TEMPLATE_CODE:-}
      FOREST_SMS_LOG_CONTENT_MODE: ${FOREST_SMS_LOG_CONTENT_MODE:-MASKED_PARTIAL}
      FOREST_SMS_LOG_MASK_VISIBLE_TAIL: ${FOREST_SMS_LOG_MASK_VISIBLE_TAIL:-2}
      FOREST_SMS_ALIYUN_ENDPOINT: ${FOREST_SMS_ALIYUN_ENDPOINT:-dysmsapi.aliyuncs.com}
      FOREST_SMS_ALIYUN_ACCESS_KEY_ID: ${FOREST_SMS_ALIYUN_ACCESS_KEY_ID:-}
      FOREST_SMS_ALIYUN_ACCESS_KEY_SECRET: ${FOREST_SMS_ALIYUN_ACCESS_KEY_SECRET:-}
      REDIS_HOST: ${REDIS_HOST:-forest-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-forest_redis_shared_2026}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      FOREST_FILE_ENV: ${FOREST_FILE_ENV:-local}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      TRADE_LEADS_OSS_BUCKET: ${TRADE_LEADS_OSS_BUCKET:-trade-leads}
      TRADE_LEADS_MINIAPP_APPID: ${TRADE_LEADS_MINIAPP_APPID:-}
      TRADE_LEADS_MINIAPP_SECRET: ${TRADE_LEADS_MINIAPP_SECRET:-}
      TRADE_LEADS_MINIAPP_MOCK_ENABLED: ${TRADE_LEADS_MINIAPP_MOCK_ENABLED:-false}
      WECHAT_PAY_ENABLED: ${WECHAT_PAY_ENABLED:-false}
      WECHAT_PAY_MOCK_ENABLED: ${WECHAT_PAY_MOCK_ENABLED:-true}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
      WECHAT_PAY_APPID: ${WECHAT_PAY_APPID:-}
      WECHAT_PAY_MERCHANT_SERIAL_NO: ${WECHAT_PAY_MERCHANT_SERIAL_NO:-}
      WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY:-}
      WECHAT_PAY_PRIVATE_KEY_PATH: ${WECHAT_PAY_PRIVATE_KEY_PATH:-/run/secrets/wechat-pay/apiclient_key.pem}
      WECHAT_PAY_PUBLIC_KEY_ID: ${WECHAT_PAY_PUBLIC_KEY_ID:-}
      WECHAT_PAY_PUBLIC_KEY_PATH: ${WECHAT_PAY_PUBLIC_KEY_PATH:-/run/secrets/wechat-pay/wechatpay_public_key.pem}
      WECHAT_PAY_NOTIFY_URL: ${WECHAT_PAY_NOTIFY_URL:-http://localhost:8081/api/open/wechat/pay/notify}
    networks:
      - forest_network

networks:
  forest_network:
    name: ${FOREST_DOCKER_NETWORK:-forest_network}
